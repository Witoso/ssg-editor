name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm format:check

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Test (node + browser)
        run: pnpm test

      - name: Type-check and build
        run: pnpm build

      - name: Plugin lint
        run: pnpm --filter @witoso/ckeditor5-frontmatter lint

      # The plugin's browser tests run via WebdriverIO + Chrome, which is
      # unreliable on GitHub runners ("Failed to connect to the browser
      # session within the timeout"). They pass locally — run them with
      # `pnpm --filter @witoso/ckeditor5-frontmatter exec vitest run`.
      # TODO: re-enable in CI (e.g. switch to the @vitest/browser-playwright
      # provider the app already uses).

      - name: Plugin build
        run: pnpm --filter @witoso/ckeditor5-frontmatter build
